<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="imagetoolbar" content="no">
  <title>Adexium + RichAds Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <!-- Adexium SDK -->
  <script type="text/javascript" src="https://cdn.adexium.tech/assets/js/adexium-widget.min.js"></script>
  <!-- RichAds SDK -->
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 10px;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #334155;
    }
    h1 { font-size: 22px; margin-bottom: 4px; color: #f1f5f9; text-align: center; }
    .subtitle { text-align: center; font-size: 11px; color: #94a3b8; margin-bottom: 12px; }
    
    .network-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      background: #0f172a;
      border-radius: 12px;
      padding: 4px;
    }
    .network-tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      color: #94a3b8;
      background: transparent;
    }
    .network-tab.adexium-tab.active { background: #6366f1; color: white; }
    .network-tab.richads-tab.active { background: #f59e0b; color: #000; }
    
    .network-section { display: none; }
    .network-section.active { display: block; }
    
    .ad-card {
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid #334155;
    }
    .ad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ad-title { font-weight: 600; font-size: 16px; color: #f8fafc; }
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      color: white;
    }
    .badge.adexium { background: #6366f1; }
    .badge.richads { background: #f59e0b; color: #000; }
    .badge.active-badge { background: #10b981; }
    .badge.loading-badge { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .format {
      background: #475569;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      text-transform: uppercase;
    }
    .wid {
      font-family: monospace;
      font-size: 9px;
      color: #94a3b8;
      background: #1e293b;
      padding: 4px 8px;
      border-radius: 8px;
      word-break: break-all;
      margin: 8px 0;
      display: block;
    }
    .ad-box {
      background: #0f172a;
      border-radius: 10px;
      min-height: 100px;
      margin: 10px 0;
      border: 1px dashed #334155;
      overflow: hidden;
      position: relative;
      transition: all 0.3s;
    }
    .ad-box.active { border-color: #10b981; border-style: solid; }
    .ad-box.reloading { border-color: #f59e0b; border-style: solid; }
    
    .status-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      font-size: 13px;
      gap: 8px;
      flex-direction: column;
      padding: 20px;
    }
    .status-msg.loading { color: #fbbf24; }
    .status-msg.error { color: #f87171; }
    .status-msg.success { color: #86efac; }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #334155;
      border-top: 2px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .ad-content {
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .ad-content img {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      object-fit: cover;
      background: #334155;
      flex-shrink: 0;
    }
    .ad-info { flex: 1; min-width: 0; }
    .ad-info h3 { font-size: 13px; margin-bottom: 4px; color: #f1f5f9; line-height: 1.3; }
    .ad-info p { font-size: 11px; color: #94a3b8; margin-bottom: 8px; line-height: 1.3; }
    .ad-btn {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 7px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ad-btn:hover { background: #2563eb; }
    .ad-btn.richads-btn { background: #f59e0b; color: #000; }
    .ad-btn.richads-btn:hover { background: #d97706; }
    
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .btn {
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .btn-reload { background: #f59e0b; color: #000; }
    .btn-reload:hover { background: #d97706; }
    .btn-show { background: #8b5cf6; }
    .btn-show:hover { background: #7c3aed; }
    .btn-show-richads { background: #f59e0b; color: #000; }
    .btn-show-richads:hover { background: #d97706; }
    .btn-send { background: #10b981; }
    .btn-send:hover { background: #059669; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .ad-id-display {
      font-size: 9px;
      color: #64748b;
      margin-top: 4px;
      font-family: monospace;
      word-break: break-all;
    }
    .network-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      font-size: 10px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .stat-item {
      background: #1e293b;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .stat-item.green { color: #10b981; }
    .note { font-size: 10px; color: #64748b; text-align: center; margin-top: 14px; }
    .bot-status {
      background: #1e293b;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 11px;
      text-align: center;
    }
    .richads-iframe-container {
      width: 100%;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .richads-iframe-container iframe {
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Ad Dashboard</h1>
    <div class="subtitle">Adexium + RichAds • Multiple Networks</div>
    <div class="bot-status" id="botStatus">⏳ Initializing...</div>
    
    <!-- Network Tabs -->
    <div class="network-tabs">
      <button class="network-tab adexium-tab active" onclick="switchNetwork('adexium')">🔷 Adexium</button>
      <button class="network-tab richads-tab" onclick="switchNetwork('richads')">🟡 RichAds</button>
    </div>
    
    <!-- Adexium Section -->
    <div class="network-section active" id="adexium-section">
      <div class="network-label">🔷 Adexium Placements</div>
      <div id="adexiumContainer"></div>
    </div>
    
    <!-- RichAds Section -->
    <div class="network-section" id="richads-section">
      <div class="network-label">🟡 RichAds Placements (pubId: 1016054)</div>
      <div id="richadsContainer"></div>
    </div>
    
    <div class="note">Switch between networks • Click Show to display ads</div>
  </div>

  <script>
    const BOT_TOKEN = '8730973868:AAGJjqGwN5wpNjlcqb6L335VRZZhvo4u8Uc';
    
    // ============ ADEXIUM PLACEMENTS ============
    const adexiumPlacements = [
      { name: "Ticgames", wid: "30015b9a-df1e-4895-be7b-c5bc1b148fcf", format: "push-like", note: "Placement #12002" },
      { name: "Coin Empire", wid: "d29f2549-2e28-4016-8b89-f36b11f66244", format: "push-like", note: "Placement #12058" },
      { name: "Coin Empire", wid: "f2c903be-ac1d-4f6b-b0c7-8a281363517e", format: "interstitial", note: "Placement #12060" }
    ];

    // ============ RICHADS PLACEMENTS ============
    const richadsPlacements = [
      { id: "400684", name: "Telegram Playable ads", format: "playable", domain: "tempmail44.com", stats: { impressions: 0, clicks: 0, ctr: 0, cpm: 0, spend: 0 } },
      { id: "400683", name: "Telegram Interstitial video", format: "interstitial-video", domain: "tempmail44.com", stats: { impressions: 0, clicks: 0, ctr: 0, cpm: 0, spend: 0 } },
      { id: "400682", name: "Telegram Interstitial banner", format: "interstitial-banner", domain: "tempmail44.com", stats: { impressions: 3, clicks: 2, ctr: 66.67, cpm: 3.58, spend: 0.011 } },
      { id: "400681", name: "Telegram Embedded banner", format: "embedded-banner", domain: "tempmail44.com", stats: { impressions: 0, clicks: 0, ctr: 0, cpm: 0, spend: 0 } },
      { id: "400680", name: "Telegram Push-style", format: "push-style", domain: "tempmail44.com", stats: { impressions: 0, clicks: 0, ctr: 0, cpm: 0, spend: 0 } }
    ];

    const richadsConfig = {
      pubId: "1016054",
      appId: "7952"
    };

    // State
    const adexiumWidgets = {};
    const adexiumCache = {};
    const adexiumReloadCount = {};
    const richadsWidgets = {};
    const richadsCache = {};
    let richadsController = null;
    let currentNetwork = 'adexium';

    adexiumPlacements.forEach((p, i) => { adexiumReloadCount[i] = 0; });

    if (window.Telegram?.WebApp) {
      try {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      } catch(e) {}
    }

    async function checkBot() {
      const status = document.getElementById('botStatus');
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
        const data = await res.json();
        status.innerHTML = data.ok ? '✅ Bot @' + data.result.username + ' connected' : '⚠ Bot connection issue';
        status.style.color = data.ok ? '#86efac' : '#fbbf24';
      } catch(e) {
        status.innerHTML = '⚠ Cannot verify bot';
        status.style.color = '#fbbf24';
      }
    }

    // ============ NETWORK SWITCHING ============
    function switchNetwork(network) {
      currentNetwork = network;
      document.querySelectorAll('.network-tab').forEach(tab => tab.classList.remove('active'));
      document.querySelector(`.${network}-tab`).classList.add('active');
      document.querySelectorAll('.network-section').forEach(section => section.classList.remove('active'));
      document.getElementById(`${network}-section`).classList.add('active');
      console.log(`🔄 Switched to ${network}`);
    }

    // ============ ADEXIUM FUNCTIONS ============
    function reloadAdexiumWidget(index) {
      const placement = adexiumPlacements[index];
      const box = document.getElementById('adexium-box-' + index);
      if (!box) return;

      adexiumReloadCount[index]++;
      box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Loading Adexium ad...</div>';
      box.classList.add('reloading');

      if (adexiumWidgets[index]) {
        try {
          adexiumWidgets[index].off?.('adReceived', () => {});
          adexiumWidgets[index].off?.('noAdFound', () => {});
          adexiumWidgets[index].destroy?.();
        } catch(e) {}
        delete adexiumWidgets[index];
      }
      delete adexiumCache[index];

      setTimeout(() => {
        if (typeof AdexiumWidget === 'undefined') {
          box.innerHTML = '<div class="status-msg error">⚠ Adexium SDK not loaded</div>';
          return;
        }
        try {
          const widget = new AdexiumWidget({
            wid: placement.wid,
            adFormat: placement.format,
            debug: false,
            firstAdImpressionIntervalInSeconds: 2,
            adImpressionIntervalInSeconds: 999999
          });
          adexiumWidgets[index] = widget;
          let adReceived = false;

          widget.on('adReceived', (ad) => {
            if (adReceived) return;
            adReceived = true;
            adexiumCache[index] = ad;
            renderAdexiumAd(box, ad, placement, index);
          });
          widget.on('noAdFound', () => {
            if (!adReceived) box.innerHTML = '<div class="status-msg error">⚠ No ad available</div>';
          });
          widget.on('adDisplayed', () => {
            box.classList.add('active');
            box.classList.remove('reloading');
          });
          widget.autoMode();
          setTimeout(() => {
            if (!adReceived && adexiumWidgets[index]) adexiumWidgets[index].requestAd(placement.format);
          }, 8000);
        } catch(e) {
          box.innerHTML = `<div class="status-msg error">⚠ ${e.message}</div>`;
        }
      }, 500);
    }

    function renderAdexiumAd(box, ad, placement, index) {
      if (!ad?.creativeUrl) {
        box.innerHTML = '<div class="status-msg success">✅ Widget ready</div>';
        return;
      }
      const displayId = ad.id || Math.random().toString(36).substring(7);
      box.innerHTML = `
        <div class="ad-content">
          <img src="${ad.creativeUrl}?t=${Date.now()}" alt="Ad" onerror="this.style.display='none'" loading="lazy" />
          <div class="ad-info">
            <h3>${ad.title || 'Sponsored'}</h3>
            ${ad.description ? `<p>${ad.description}</p>` : ''}
            <a href="${ad.clickUrl || '#'}" target="_blank" class="ad-btn">${ad.buttonText || 'Open'}</a>
          </div>
        </div>
        <div class="ad-id-display">🔷 Adexium | 🆔 ${displayId} | Reload #${adexiumReloadCount[index]}</div>
      `;
      box.classList.add('active');
      box.classList.remove('reloading');
    }

    function showAdexiumAd(index) {
      const widget = adexiumWidgets[index];
      const ad = adexiumCache[index];
      if (ad && widget) {
        widget.displayAd(ad);
      } else {
        reloadAdexiumWidget(index);
      }
    }

    async function sendAdexiumToBot(index) {
      const ad = adexiumCache[index];
      if (!ad?.creativeUrl) { alert('No ad available'); return; }
      const user = { telegramId: 'test123' };
      try {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
          user.telegramId = String(window.Telegram.WebApp.initDataUnsafe.user.id);
        }
      } catch(e) {}
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: user.telegramId,
            photo: ad.creativeUrl,
            caption: `${ad.title || ''}\n\n${ad.description || ''}`,
            reply_markup: { inline_keyboard: [[{ text: ad.buttonText || 'Open', url: ad.clickUrl }]] }
          })
        });
        alert('✅ Ad sent to bot!');
      } catch(e) {
        alert('Send failed: ' + e.message);
      }
    }

    function renderAdexiumSection() {
      const container = document.getElementById('adexiumContainer');
      container.innerHTML = adexiumPlacements.map((p, i) => `
        <div class="ad-card">
          <div class="ad-header">
            <span class="ad-title">${p.name}</span>
            <span class="badge adexium">Adexium</span>
            <span class="format">${p.format}</span>
          </div>
          <code class="wid">${p.wid}</code>
          <div class="ad-box" id="adexium-box-${i}">
            <div class="status-msg loading"><div class="spinner"></div> Loading...</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-reload" onclick="reloadAdexiumWidget(${i})">🔄 Reload</button>
            <button class="btn btn-show" onclick="showAdexiumAd(${i})">👁 Show</button>
            <button class="btn btn-send" onclick="sendAdexiumToBot(${i})">📨 Send</button>
          </div>
        </div>
      `).join('');
      adexiumPlacements.forEach((p, i) => setTimeout(() => reloadAdexiumWidget(i), i * 800));
    }

    // ============ RICHADS FUNCTIONS ============
    function initRichAdsController() {
      if (richadsController) return richadsController;
      
      if (typeof TelegramAdsController === 'undefined') {
        console.error('RichAds SDK not loaded');
        return null;
      }

      try {
        richadsController = new TelegramAdsController();
        richadsController.initialize({
          pubId: richadsConfig.pubId,
          appId: richadsConfig.appId,
        });
        console.log('✅ RichAds controller initialized');
        return richadsController;
      } catch(e) {
        console.error('RichAds init error:', e);
        return null;
      }
    }

    function showRichAdsAd(index) {
      const placement = richadsPlacements[index];
      const box = document.getElementById('richads-box-' + index);
      if (!box) return;

      box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Loading RichAds ad...</div>';
      box.classList.add('reloading');

      const controller = initRichAdsController();
      if (!controller) {
        box.innerHTML = '<div class="status-msg error">⚠ RichAds SDK not available</div>';
        return;
      }

      // RichAds typically injects ads into containers
      // We create a unique container for each placement
      const adContainerId = 'richads-ad-' + index + '-' + Date.now();
      box.innerHTML = `
        <div class="richads-iframe-container" id="${adContainerId}">
          <div class="status-msg loading"><div class="spinner"></div> RichAds loading...</div>
        </div>
        <div class="ad-id-display">🟡 RichAds | Placement #${placement.id} | ${placement.format}</div>
      `;
      
      box.classList.add('active');
      box.classList.remove('reloading');

      // RichAds will automatically find and fill the container
      setTimeout(() => {
        const adContainer = document.getElementById(adContainerId);
        if (adContainer && !adContainer.querySelector('iframe') && !adContainer.querySelector('img')) {
          // If RichAds didn't fill it, show placeholder with placement info
          adContainer.innerHTML = `
            <div style="text-align:center;padding:20px;">
              <div style="font-size:32px;margin-bottom:8px;">🟡</div>
              <div style="font-size:13px;color:#f1f5f9;font-weight:600;">${placement.name}</div>
              <div style="font-size:11px;color:#94a3b8;margin-top:4px;">Placement #${placement.id}</div>
              <div style="font-size:10px;color:#64748b;margin-top:2px;">Format: ${placement.format}</div>
              <button class="btn btn-show-richads" style="margin-top:10px;" onclick="showRichAdsAd(${index})">🔄 Retry</button>
            </div>
          `;
        }
      }, 4000);
    }

    function reloadRichAdsPlacement(index) {
      const placement = richadsPlacements[index];
      const box = document.getElementById('richads-box-' + index);
      if (!box) return;
      
      console.log(`🔄 Reloading RichAds placement #${placement.id}`);
      box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Reloading...</div>';
      
      // Re-initialize controller and show ad
      if (richadsController) {
        try { richadsController.destroy?.(); } catch(e) {}
        richadsController = null;
      }
      
      setTimeout(() => showRichAdsAd(index), 500);
    }

    function renderRichAdsSection() {
      const container = document.getElementById('richadsContainer');
      
      container.innerHTML = richadsPlacements.map((p, i) => `
        <div class="ad-card">
          <div class="ad-header">
            <span class="ad-title">${p.name}</span>
            <span class="badge richads">RichAds</span>
            <span class="format">${p.format}</span>
          </div>
          <code class="wid">#${p.id} • ${p.domain}</code>
          <div class="stats-row">
            <span class="stat-item">👁 ${p.stats.impressions}</span>
            <span class="stat-item">👆 ${p.stats.clicks}</span>
            <span class="stat-item ${p.stats.ctr > 0 ? 'green' : ''}">CTR ${p.stats.ctr}%</span>
            <span class="stat-item">CPM $${p.stats.cpm}</span>
            <span class="stat-item">💰 $${p.stats.spend}</span>
          </div>
          <div class="ad-box" id="richads-box-${i}">
            <div class="status-msg success">✅ Ready - Click Show to display</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-show-richads" onclick="showRichAdsAd(${i})">👁 Show Ad</button>
            <button class="btn btn-reload" onclick="reloadRichAdsPlacement(${i})">🔄 Reload</button>
          </div>
          <div class="ad-id-display">🟡 RichAds Placement #${p.id}</div>
        </div>
      `).join('');

      // Initialize RichAds controller
      initRichAdsController();
    }

    // ============ INITIALIZATION ============
    function renderAll() {
      renderAdexiumSection();
      renderRichAdsSection();
    }

    // Expose globally
    window.switchNetwork = switchNetwork;
    window.reloadAdexiumWidget = reloadAdexiumWidget;
    window.showAdexiumAd = showAdexiumAd;
    window.sendAdexiumToBot = sendAdexiumToBot;
    window.showRichAdsAd = showRichAdsAd;
    window.reloadRichAdsPlacement = reloadRichAdsPlacement;

    async function init() {
      console.log('🚀 Ad Dashboard - Adexium + RichAds');
      console.log('AdexiumWidget:', typeof AdexiumWidget);
      console.log('TelegramAdsController:', typeof TelegramAdsController);
      await checkBot();
      renderAll();
    }

    function waitForSDK(cb) {
      if (typeof AdexiumWidget !== 'undefined') { cb(); return; }
      let attempts = 0;
      const int = setInterval(() => {
        if (typeof AdexiumWidget !== 'undefined') { clearInterval(int); cb(); }
        else if (attempts++ >= 50) { clearInterval(int); cb(); }
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => waitForSDK(init));
  </script>
</body>
</html>
