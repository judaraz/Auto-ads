<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Adexium Ads Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 10px;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #334155;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #f1f5f9;
      text-align: center;
    }
    .ad-card {
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .ad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ad-title {
      font-weight: 600;
      font-size: 18px;
      color: #f8fafc;
    }
    .badge {
      background: #10b981;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .format {
      background: #6366f1;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      text-transform: uppercase;
    }
    .wid {
      font-family: monospace;
      font-size: 11px;
      color: #94a3b8;
      background: #1e293b;
      padding: 4px 8px;
      border-radius: 8px;
      word-break: break-all;
      margin: 8px 0;
    }
    .ad-box {
      background: #1e293b;
      border-radius: 10px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
      border: 1px dashed #475569;
      overflow: hidden;
    }
    .ad-content {
      display: flex;
      gap: 12px;
      padding: 12px;
      width: 100%;
      align-items: flex-start;
    }
    .ad-content img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #334155;
    }
    .ad-info {
      flex: 1;
    }
    .ad-info h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #f1f5f9;
    }
    .ad-btn {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ad-btn:hover { background: #2563eb; }
    .ad-btn.green { background: #10b981; }
    .ad-btn.green:hover { background: #059669; }
    
    .loading {
      color: #fbbf24;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    .error {
      color: #f87171;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    .status {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 8px;
    }
    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .note {
      font-size: 12px;
      color: #64748b;
      margin-top: 16px;
      text-align: center;
    }
    .bot-status {
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Adexium Ads</h1>
    <div class="bot-status" id="botStatus">Checking bot connection...</div>
    <div id="adsContainer"></div>
    <div class="note">Ads refresh automatically • Real users only</div>
  </div>

  <script>
    const BOT_TOKEN = '8730973868:AAGJjqGwN5wpNjlcqb6L335VRZZhvo4u8Uc';
    
    const placements = [
      {
        name: "Ticgames",
        wid: "30015b9a-df1e-4895-be7b-c5bc1b148fcf",
        format: "push-like",
        note: "Integration working"
      },
      {
        name: "Coin Empire",
        wid: "d29f2549-2e28-4016-8b89-f36b11f66244",
        format: "push-like",
        note: "Integration working"
      },
      {
        name: "Coin Empire",
        wid: "f2c903be-ac1d-4f6b-b0c7-8a281363517e",
        format: "interstitial",
        note: "Waiting for first request"
      }
    ];

    const adData = {};

    function getUserData() {
      const data = { telegramId: 'test123', firstName: 'User', language: 'en', isPremium: false };
      try {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
          const u = window.Telegram.WebApp.initDataUnsafe.user;
          data.telegramId = String(u.id || 'test123');
          data.firstName = u.first_name || 'User';
          data.language = u.language_code || 'en';
          data.isPremium = u.is_premium || false;
        }
      } catch(e) {}
      return data;
    }

    async function fetchAd(placement, index) {
      const box = document.getElementById('ad-box-' + index);
      if (!box) return;
      
      box.innerHTML = '<div class="loading">⏳ Loading ad...</div>';
      
      const user = getUserData();
      
      try {
        const res = await fetch('https://bid.tgads.live/bot-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            wid: placement.wid,
            language: user.language,
            isPremium: user.isPremium,
            firstName: user.firstName,
            telegramId: user.telegramId
          })
        });
        
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const data = await res.json();
        adData[index] = data;
        
        if (data.image) {
          box.innerHTML = `
            <div class="ad-content">
              <img src="${data.image}" alt="Ad" onerror="this.style.display='none'" />
              <div class="ad-info">
                <h3>${data.text || 'Sponsored'}</h3>
                <a href="${data.clickUrl || '#'}" target="_blank" class="ad-btn" onclick="window.Telegram?.WebApp?.openLink?.('${data.clickUrl}')">
                  ${data.buttonText || 'Open'}
                </a>
              </div>
            </div>
          `;
        } else {
          box.innerHTML = '<div class="loading">📭 No ad available</div>';
        }
      } catch(e) {
        box.innerHTML = '<div class="error">⚠ ' + e.message + '</div>';
        console.error('Ad fetch error:', e);
      }
    }

    async function sendToBot(index) {
      const data = adData[index];
      if (!data?.image) { alert('No ad to send'); return; }
      
      const user = getUserData();
      const btn = document.getElementById('send-btn-' + index);
      if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
      
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: user.telegramId,
            photo: data.image,
            caption: data.text || '',
            reply_markup: { inline_keyboard: [[{ text: data.buttonText || 'Open', url: data.clickUrl }]] }
          })
        });
        
        const result = await res.json();
        if (result.ok) {
          if (btn) { btn.textContent = '✅ Sent!'; }
          setTimeout(() => { if (btn) { btn.textContent = '📨 Send to Bot'; btn.disabled = false; } }, 3000);
        } else {
          throw new Error(result.description || 'Failed');
        }
      } catch(e) {
        alert('Error: ' + e.message);
        if (btn) { btn.textContent = '📨 Send to Bot'; btn.disabled = false; }
      }
    }

    async function checkBot() {
      const status = document.getElementById('botStatus');
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
        const data = await res.json();
        if (data.ok) {
          status.innerHTML = '✅ Bot @' + data.result.username + ' connected';
          status.style.color = '#86efac';
        } else {
          status.innerHTML = '⚠ Bot connection issue';
          status.style.color = '#fbbf24';
        }
      } catch(e) {
        status.innerHTML = '❌ Cannot reach Telegram API';
        status.style.color = '#f87171';
      }
    }

    function renderAll() {
      const container = document.getElementById('adsContainer');
      container.innerHTML = placements.map((p, i) => `
        <div class="ad-card">
          <div class="ad-header">
            <span class="ad-title">${p.name}</span>
            <span class="badge">active</span>
            <span class="format">${p.format}</span>
          </div>
          <div class="wid">${p.wid}</div>
          <div class="ad-box" id="ad-box-${i}">
            <div class="loading">⏳ Loading...</div>
          </div>
          <div class="buttons">
            <button class="ad-btn" onclick="fetchAd(placements[${i}], ${i})">🔄 Reload</button>
            <button class="ad-btn green" id="send-btn-${i}" onclick="sendToBot(${i})">📨 Send to Bot</button>
          </div>
          <div class="status">${p.note}</div>
        </div>
      `).join('');

      placements.forEach((p, i) => setTimeout(() => fetchAd(p, i), i * 1000));
    }

    window.fetchAd = fetchAd;
    window.sendToBot = sendToBot;
    window.placements = placements;

    async function init() {
      if (window.Telegram?.WebApp) {
        try { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); } catch(e) {}
      }
      await checkBot();
      renderAll();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
