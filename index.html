<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="imagetoolbar" content="no">
  <title>Adexium Ads Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <script type="text/javascript" src="https://cdn.adexium.tech/assets/js/adexium-widget.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 10px;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #334155;
    }
    h1 { font-size: 24px; margin-bottom: 4px; color: #f1f5f9; text-align: center; }
    .subtitle { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
    .ad-card {
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .ad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ad-title { font-weight: 600; font-size: 18px; color: #f8fafc; }
    .badge {
      background: #10b981;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.loading-badge {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .format {
      background: #6366f1;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      text-transform: uppercase;
    }
    .wid {
      font-family: monospace;
      font-size: 10px;
      color: #94a3b8;
      background: #1e293b;
      padding: 4px 8px;
      border-radius: 8px;
      word-break: break-all;
      margin: 8px 0;
      display: block;
    }
    .ad-box {
      background: #0f172a;
      border-radius: 10px;
      min-height: 100px;
      margin: 12px 0;
      border: 1px dashed #334155;
      overflow: hidden;
      position: relative;
      transition: all 0.3s;
    }
    .ad-box.active {
      border-color: #10b981;
      border-style: solid;
    }
    .ad-box.reloading {
      border-color: #f59e0b;
      border-style: solid;
    }
    .status-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      font-size: 14px;
      gap: 8px;
      flex-direction: column;
    }
    .status-msg.loading { color: #fbbf24; }
    .status-msg.error { color: #f87171; }
    .status-msg.success { color: #86efac; }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #334155;
      border-top: 2px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .ad-content {
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .ad-content img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #334155;
      flex-shrink: 0;
    }
    .ad-info { flex: 1; min-width: 0; }
    .ad-info h3 { font-size: 14px; margin-bottom: 4px; color: #f1f5f9; line-height: 1.3; }
    .ad-info p { font-size: 12px; color: #94a3b8; margin-bottom: 8px; line-height: 1.3; }
    .ad-btn {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 8px;
    }
    .ad-btn:hover { background: #2563eb; transform: translateY(-1px); }
    
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .btn-reload { background: #f59e0b; color: #000; }
    .btn-reload:hover { background: #d97706; }
    .btn-show { background: #8b5cf6; }
    .btn-show:hover { background: #7c3aed; }
    .btn-send { background: #10b981; }
    .btn-send:hover { background: #059669; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .ad-id-display {
      font-size: 9px;
      color: #64748b;
      margin-top: 4px;
      font-family: monospace;
      word-break: break-all;
    }
    .note { font-size: 11px; color: #64748b; text-align: center; margin-top: 16px; }
    .bot-status {
      background: #1e293b;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Adexium Ads</h1>
    <div class="subtitle">Fresh ads on every reload</div>
    <div class="bot-status" id="botStatus">⏳ Initializing...</div>
    <div id="adsContainer"></div>
    <div class="note">🔄 Reload destroys old widget & creates new one for fresh ads</div>
  </div>

  <script>
    const BOT_TOKEN = '8730973868:AAGJjqGwN5wpNjlcqb6L335VRZZhvo4u8Uc';
    
    const placements = [
      { name: "Ticgames", wid: "30015b9a-df1e-4895-be7b-c5bc1b148fcf", format: "push-like", note: "Placement #12002" },
      { name: "Coin Empire", wid: "d29f2549-2e28-4016-8b89-f36b11f66244", format: "push-like", note: "Placement #12058" },
      { name: "Coin Empire", wid: "f2c903be-ac1d-4f6b-b0c7-8a281363517e", format: "interstitial", note: "Placement #12060" }
    ];

    const widgets = {};
    const adCache = {};
    const reloadCount = {};

    // Initialize reload counters
    placements.forEach((p, i) => { reloadCount[i] = 0; });

    if (window.Telegram?.WebApp) {
      try {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      } catch(e) {}
    }

    async function checkBot() {
      const status = document.getElementById('botStatus');
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
        const data = await res.json();
        status.innerHTML = data.ok ? '✅ Bot @' + data.result.username + ' connected' : '⚠ Bot connection issue';
        status.style.color = data.ok ? '#86efac' : '#fbbf24';
      } catch(e) {
        status.innerHTML = '⚠ Cannot verify bot';
        status.style.color = '#fbbf24';
      }
    }

    // COMPLETELY DESTROY and RECREATE widget for fresh ad
    function reloadWidget(index) {
      const placement = placements[index];
      const box = document.getElementById('ad-box-' + index);
      if (!box) return;

      reloadCount[index]++;
      console.log(`🔄 [${placement.name}] RELOAD #${reloadCount[index]} - Destroying old widget...`);

      // Update UI
      box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Destroying old widget...</div>';
      box.classList.add('reloading');
      
      const badge = document.getElementById('badge-' + index);
      if (badge) {
        badge.textContent = 'reloading';
        badge.className = 'badge loading-badge';
      }

      // STEP 1: Destroy old widget completely
      if (widgets[index]) {
        try {
          // Remove all event listeners
          widgets[index].off?.('adReceived', () => {});
          widgets[index].off?.('noAdFound', () => {});
          widgets[index].off?.('adDisplayed', () => {});
          widgets[index].off?.('adClosed', () => {});
          widgets[index].off?.('adRedirected', () => {});
          
          // Call destroy if available
          widgets[index].destroy?.();
        } catch(e) {
          console.log('Error destroying widget:', e);
        }
        delete widgets[index];
      }
      
      // Clear cached ad
      delete adCache[index];

      // STEP 2: Wait a moment, then create fresh widget
      setTimeout(() => {
        console.log(`🆕 [${placement.name}] Creating FRESH widget...`);
        box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Creating new widget...</div>';
        
        if (typeof AdexiumWidget === 'undefined') {
          box.innerHTML = '<div class="status-msg error">⚠ Adexium SDK not loaded</div>';
          return;
        }

        try {
          // Create brand new widget instance
          const widget = new AdexiumWidget({
            wid: placement.wid,
            adFormat: placement.format,
            debug: false,
            firstAdImpressionIntervalInSeconds: 2, // Quick first ad
            adImpressionIntervalInSeconds: 999999 // Don't auto-refresh, we control it manually
          });

          widgets[index] = widget;
          
          // Track when ad was received
          let adReceived = false;
          
          // Ad received handler
          widget.on('adReceived', (ad) => {
            if (adReceived) return; // Prevent duplicate renders
            adReceived = true;
            
            console.log(`✅ [${placement.name}] FRESH AD RECEIVED:`, {
              title: ad.title,
              id: ad.id || ad.notificationUrl?.split('=').pop() || 'N/A',
              creativeUrl: ad.creativeUrl?.substring(0, 50) + '...'
            });
            
            adCache[index] = ad;
            renderAdInBox(box, ad, placement, index);
            
            // Update badge
            const badge = document.getElementById('badge-' + index);
            if (badge) {
              badge.textContent = 'active';
              badge.className = 'badge';
            }
          });

          // No ad found
          widget.on('noAdFound', () => {
            console.log(`📭 [${placement.name}] No ad available`);
            if (!adReceived) {
              box.innerHTML = '<div class="status-msg error">⚠ No ad available. Try again.</div>';
              const badge = document.getElementById('badge-' + index);
              if (badge) {
                badge.textContent = 'no ad';
                badge.className = 'badge';
                badge.style.background = '#ef4444';
              }
            }
          });

          widget.on('adDisplayed', () => {
            console.log(`👁 [${placement.name}] Ad displayed`);
            box.classList.add('active');
            box.classList.remove('reloading');
          });

          widget.on('adClosed', () => console.log(`❌ [${placement.name}] Ad closed`));
          widget.on('adRedirected', () => console.log(`🔗 [${placement.name}] Ad clicked`));

          // Start auto mode
          widget.autoMode();
          console.log(`🚀 [${placement.name}] New widget autoMode started`);

          // Fallback: if no ad after 8 seconds, try requestAd
          setTimeout(() => {
            if (!adReceived && widgets[index]) {
              console.log(`⏰ [${placement.name}] No ad after 8s, trying requestAd()...`);
              try {
                widgets[index].requestAd(placement.format);
              } catch(e) {
                console.error('requestAd error:', e);
              }
            }
          }, 8000);

        } catch(e) {
          console.error(`❌ [${placement.name}] Widget creation error:`, e);
          box.innerHTML = `<div class="status-msg error">⚠ ${e.message}</div>`;
        }
      }, 500); // 500ms delay between destroy and create
    }

    function renderAdInBox(box, ad, placement, index) {
      if (!ad || !ad.creativeUrl) {
        box.innerHTML = '<div class="status-msg success">✅ Widget ready</div>';
        return;
      }

      // Generate unique ID for this ad display
      const displayId = ad.id || ad.notificationUrl?.split('=').pop() || Math.random().toString(36).substring(7);
      
      box.innerHTML = `
        <div class="ad-content">
          <img src="${ad.creativeUrl}?t=${Date.now()}" alt="Ad" 
               onerror="this.style.display='none'"
               loading="lazy" />
          <div class="ad-info">
            <h3>${ad.title || 'Sponsored'}</h3>
            ${ad.description ? `<p>${ad.description}</p>` : ''}
            <div>
              <a href="${ad.clickUrl || '#'}" target="_blank" class="ad-btn" 
                 onclick="window.Telegram?.WebApp?.openLink?.('${ad.clickUrl}')">
                ${ad.buttonText || 'Open'}
              </a>
            </div>
          </div>
        </div>
        <div class="ad-id-display">🆔 ${displayId} | Reload #${reloadCount[index]}</div>
      `;
      box.classList.add('active');
      box.classList.remove('reloading');
      
      console.log(`🎨 [${placement.name}] Ad rendered with ID: ${displayId}`);
    }

    function showAd(index) {
      const widget = widgets[index];
      const ad = adCache[index];
      const box = document.getElementById('ad-box-' + index);
      
      if (ad && widget) {
        console.log(`👁 [${placements[index].name}] Displaying cached ad`);
        widget.displayAd(ad);
        box.classList.add('active');
      } else {
        console.log(`📡 [${placements[index].name}] No cached ad, reloading...`);
        reloadWidget(index);
      }
    }

    async function sendToBot(index) {
      const ad = adCache[index];
      if (!ad?.creativeUrl) {
        alert('No ad available. Click Reload first.');
        return;
      }

      const user = { telegramId: 'test123' };
      try {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
          user.telegramId = String(window.Telegram.WebApp.initDataUnsafe.user.id);
        }
      } catch(e) {}

      const btn = document.getElementById('send-btn-' + index);
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Sending...'; }

      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: user.telegramId,
            photo: ad.creativeUrl,
            caption: `${ad.title || ''}\n\n${ad.description || ''}`,
            reply_markup: { inline_keyboard: [[{ text: ad.buttonText || 'Open', url: ad.clickUrl }]] }
          })
        });
        const result = await res.json();
        if (result.ok) {
          if (btn) { btn.textContent = '✅ Sent!'; }
          setTimeout(() => { if (btn) { btn.textContent = '📨 Send to Bot'; btn.disabled = false; } }, 3000);
        } else {
          throw new Error(result.description || 'Failed');
        }
      } catch(e) {
        alert('Send failed: ' + e.message);
        if (btn) { btn.textContent = '📨 Send to Bot'; btn.disabled = false; }
      }
    }

    function renderAll() {
      const container = document.getElementById('adsContainer');
      container.innerHTML = placements.map((p, i) => `
        <div class="ad-card">
          <div class="ad-header">
            <span class="ad-title">${p.name}</span>
            <span class="badge" id="badge-${i}">active</span>
            <span class="format">${p.format}</span>
          </div>
          <code class="wid">${p.wid}</code>
          <div class="ad-box" id="ad-box-${i}">
            <div class="status-msg loading"><div class="spinner"></div> Loading...</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-reload" onclick="reloadWidget(${i})">🔄 Reload (New Ad)</button>
            <button class="btn btn-show" onclick="showAd(${i})">👁 Show Ad</button>
            <button class="btn btn-send" id="send-btn-${i}" onclick="sendToBot(${i})">📨 Send to Bot</button>
          </div>
          <div class="ad-id-display">Reload count: 0</div>
        </div>
      `).join('');

      // Initialize all widgets
      placements.forEach((p, i) => {
        setTimeout(() => reloadWidget(i), i * 800);
      });
    }

    // Expose globally
    window.reloadWidget = reloadWidget;
    window.showAd = showAd;
    window.sendToBot = sendToBot;

    async function init() {
      console.log('🚀 Adexium Dashboard - Fresh Ads on Reload');
      console.log('AdexiumWidget available:', typeof AdexiumWidget !== 'undefined');
      await checkBot();
      renderAll();
    }

    function waitForSDK(cb) {
      if (typeof AdexiumWidget !== 'undefined') { cb(); return; }
      let attempts = 0;
      const int = setInterval(() => {
        if (typeof AdexiumWidget !== 'undefined') { clearInterval(int); cb(); }
        else if (attempts++ >= 50) { clearInterval(int); cb(); }
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => waitForSDK(init));
  </script>
</body>
</html>
