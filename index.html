<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Adexium · placements dashboard</title>
  <!-- Telegram Web App script (optional but recommended for mini app context) -->
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <!-- Adexium widget core -->
  <script type="text/javascript" src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0f172a;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #e2e8f0;
    }
    .dashboard {
      max-width: 700px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 2.5rem;
      padding: 1.8rem 1.5rem 2.2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }
    h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
      color: #f1f5f9;
      border-bottom: 1px solid #334155;
      padding-bottom: 0.9rem;
    }
    h1 span {
      background: #3b82f6;
      padding: 0.2rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      margin-left: 0.5rem;
    }
    .placement-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin: 1.8rem 0 1.2rem;
    }
    .card {
      background: #1e293b;
      border-radius: 1.8rem;
      padding: 1.4rem 1.4rem 1.2rem;
      border: 1px solid #334155;
      transition: all 0.2s ease;
      box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      border-color: #475569;
      background: #1e293b;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.7rem;
    }
    .placement-name {
      font-weight: 650;
      font-size: 1.4rem;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .badge {
      background: #059669;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      letter-spacing: 0.3px;
      background: #10b981;
    }
    .format-badge {
      background: #2563eb;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      text-transform: uppercase;
      margin-left: 0.3rem;
    }
    .meta {
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
      margin: 0.5rem 0 0.9rem;
    }
    .wid {
      font-family: 'Fira Code', monospace;
      background: #0f172a;
      padding: 0.2rem 0.5rem;
      border-radius: 12px;
      font-size: 0.7rem;
      color: #a5b4fc;
      word-break: break-all;
    }
    .link {
      color: #7dd3fc;
      text-decoration: none;
      border-bottom: 1px dashed #7dd3fc;
      font-size: 0.8rem;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.4rem;
    }
    .active-dot {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      color: #86efac;
    }
    .active-dot::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px #22c55e;
    }
    .request-info {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    button {
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: 550;
      padding: 0.7rem 1.3rem;
      border-radius: 2.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      background: #2563eb;
      transition: 0.2s;
      margin-top: 0.7rem;
      width: fit-content;
      letter-spacing: 0.3px;
      border: 1px solid #3b82f6;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    button:hover {
      background: #1d4ed8;
      border-color: #60a5fa;
    }
    .ad-container {
      margin-top: 0.9rem;
      min-height: 50px;
      background: #0f172a;
      border-radius: 1rem;
      padding: 0.5rem;
      border: 1px dashed #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .auto-note {
      font-size: 0.75rem;
      color: #fbbf24;
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    hr {
      border-color: #2d3a4f;
      margin: 1.4rem 0 0.8rem;
    }
    .footer-note {
      font-size: 0.7rem;
      color: #64748b;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>
      📡 Adexium
      <span>my placements</span>
    </h1>
    <div class="placement-grid" id="placementGrid">
      <!-- Dynamic cards will be injected via JS, but we also use static structure for clarity. 
           We'll generate from data to keep ads auto-initialized. -->
    </div>
    <div class="auto-note">
      <span>⚡ Ads appear automatically · click card button to reload</span>
    </div>
    <div class="footer-note">
      Telegram Mini App · real users only
    </div>
  </div>

  <script>
    (function() {
      // ----- Placement data based on provided information -----
      const placements = [
        {
          id: "12002",
          name: "Ticgames",
          wid: "30015b9a-df1e-4895-be7b-c5bc1b148fcf",
          adFormat: "push-like",
          link: "https://ticgame-lemon.vercel.app/",
          status: "active",
          lastRequest: "03 Jul 2026 7:18 AM · 0 requests in 24h · 5 in 7 days",
          integrationNote: "Integration is working"
        },
        {
          id: "12058",
          name: "Coin Empire",
          wid: "d29f2549-2e28-4016-8b89-f36b11f66244",
          adFormat: "push-like",
          link: "https://steelhunter.deployar.site",
          status: "active",
          lastRequest: "03 Jul 2026 7:18 AM · 0 requests in 24h · 4 in 7 days",
          integrationNote: "Integration is working"
        },
        {
          id: "12060",
          name: "Coin Empire",
          wid: "f2c903be-ac1d-4f6b-b0c7-8a281363517e",
          adFormat: "interstitial",
          link: "https://steelhunter.deployar.site",
          status: "active",
          lastRequest: "Waiting for the first ad request…",
          integrationNote: "We have not seen any ad requests in the last 7 days."
        }
      ];

      // Store widget instances to manage them
      const widgetInstances = {};

      // Function to render all placement cards
      function renderPlacements() {
        const grid = document.getElementById('placementGrid');
        if (!grid) return;
        grid.innerHTML = '';

        placements.forEach((p, index) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.dataset.wid = p.wid;
          card.dataset.index = index;
          card.dataset.format = p.adFormat;

          // Build card content
          card.innerHTML = `
            <div class="card-header">
              <div class="placement-name">
                ${escapeHtml(p.name)}
                <span class="badge">active</span>
                <span class="format-badge">${escapeHtml(p.adFormat)}</span>
              </div>
            </div>
            <div class="meta">
              <span class="wid">${escapeHtml(p.wid)}</span>
              <a href="${escapeHtml(p.link)}" target="_blank" class="link" rel="noopener noreferrer">🔗 mini app link</a>
            </div>
            <div class="status-row">
              <span class="active-dot">${escapeHtml(p.status)}</span>
              <span class="request-info">${escapeHtml(p.lastRequest)}</span>
            </div>
            <div class="ad-container" id="ad-container-${index}">
              <!-- Adexium ad will be injected here dynamically -->
              <span style="color:#64748b; font-size:0.8rem;">⏳ ad loading...</span>
            </div>
            <button class="reload-ad-btn" data-index="${index}">
              <span>🔄</span> Show / Reload ad
            </button>
            <div style="font-size:0.7rem; color:#94a3b8; margin-top:0.4rem;">${escapeHtml(p.integrationNote)}</div>
          `;

          grid.appendChild(card);
        });

        // After DOM update, initialize all ad widgets automatically
        initializeAllWidgets();

        // Attach event listeners to reload buttons
        document.querySelectorAll('.reload-ad-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const index = this.dataset.index;
            if (index !== undefined) {
              reloadPlacementAd(index);
            }
          });
        });
      }

      // Simple escape utility
      function escapeHtml(text) {
        if (!text) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // Initialize Adexium widget for a specific placement index
      function initializeWidgetForIndex(index) {
        const placement = placements[index];
        if (!placement) return null;

        const containerId = `ad-container-${index}`;
        const container = document.getElementById(containerId);
        if (!container) return null;

        // Clear previous content (keep placeholder minimal)
        container.innerHTML = ''; 

        // Check if AdexiumWidget is available
        if (typeof AdexiumWidget === 'undefined') {
          console.warn('AdexiumWidget not loaded yet');
          container.innerHTML = '<span style="color:#f87171;">Adexium script missing</span>';
          return null;
        }

        try {
          // Destroy previous instance if exists for this index to avoid duplicates
          if (widgetInstances[index]) {
            // Adexium might not have public destroy, but we can try to clean container
            // and remove old instance reference. We'll set container empty.
            if (widgetInstances[index].destroy && typeof widgetInstances[index].destroy === 'function') {
              widgetInstances[index].destroy();
            }
            delete widgetInstances[index];
          }

          // Create new widget instance with WID and adFormat
          const widget = new AdexiumWidget({
            wid: placement.wid,
            adFormat: placement.adFormat
          });

          // Store instance
          widgetInstances[index] = widget;

          // Use autoMode() to automatically show ads (as requested: automatic showing)
          // According to Adexium docs, autoMode() renders the ad inside the widget's container.
          // However, AdexiumWidget might attach to body or need a target. 
          // We can call autoMode() and it should display ad. But to ensure it appears inside our container,
          // we might need to pass a selector or mount point. Adexium documentation suggests that 
          // autoMode() places the ad automatically. Some versions allow .render(containerId).
          // We'll attempt to use .render() if available, else rely on autoMode and move element.
          
          if (typeof widget.render === 'function') {
            // Try to render directly into container
            widget.render(containerId);
          } else {
            // Fallback: call autoMode and then try to append the created element to our container.
            widget.autoMode();
            
            // After a short delay, look for Adexium iframe/element and move it into container
            setTimeout(() => {
              const adElement = document.querySelector('.adexium-widget, .adexium-ad, [data-adexium]');
              if (adElement && container.children.length === 0) {
                container.appendChild(adElement);
              } else if (container.children.length === 0) {
                // If no element found, observe mutations or keep placeholder
                container.innerHTML = '<span style="color:#fbbf24;">🔄 ad request sent</span>';
              }
            }, 300);
          }

          console.log(`Adexium widget initialized for ${placement.name} (${placement.wid})`);
          return widget;
        } catch (error) {
          console.error('Error initializing Adexium widget:', error);
          container.innerHTML = '<span style="color:#f87171;">widget error</span>';
          return null;
        }
      }

      // Initialize all widgets automatically
      function initializeAllWidgets() {
        placements.forEach((_, idx) => {
          // Small delay to ensure DOM is fully ready and containers exist
          setTimeout(() => {
            initializeWidgetForIndex(idx);
          }, 100 + idx * 50);
        });
      }

      // Reload a specific placement ad (re-initialize)
      function reloadPlacementAd(index) {
        const placement = placements[index];
        if (!placement) return;
        
        const container = document.getElementById(`ad-container-${index}`);
        if (container) {
          container.innerHTML = '<span style="color:#94a3b8;">🔄 reloading ad...</span>';
        }
        
        // Destroy previous instance if any
        if (widgetInstances[index]) {
          try {
            if (typeof widgetInstances[index].destroy === 'function') {
              widgetInstances[index].destroy();
            }
          } catch (e) {}
          delete widgetInstances[index];
        }
        
        // Re-initialize after short delay
        setTimeout(() => {
          initializeWidgetForIndex(index);
        }, 150);
      }

      // Additional safety: ensure AdexiumWidget is available after script load
      function waitForAdexiumThenInit() {
        if (typeof AdexiumWidget !== 'undefined') {
          renderPlacements();
        } else {
          // Check every 200ms until available
          let attempts = 0;
          const maxAttempts = 30;
          const interval = setInterval(() => {
            if (typeof AdexiumWidget !== 'undefined') {
              clearInterval(interval);
              renderPlacements();
            } else if (attempts >= maxAttempts) {
              clearInterval(interval);
              console.error('AdexiumWidget not available after waiting');
              // Still render UI without ads maybe
              renderPlacements();
            }
            attempts++;
          }, 200);
        }
      }

      // Start process when DOM is ready
      window.addEventListener('DOMContentLoaded', () => {
        // Telegram Web App ready (optional)
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
        waitForAdexiumThenInit();
      });

      // If script loads after DOMContentLoaded, still attempt
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(() => {
          waitForAdexiumThenInit();
        }, 50);
      }
    })();
  </script>
</body>
</html>
