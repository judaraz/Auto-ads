<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="imagetoolbar" content="no">
  <title>Adexium Ads Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <script type="text/javascript" src="https://cdn.adexium.tech/assets/js/adexium-widget.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 10px;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #334155;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 4px;
      color: #f1f5f9;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .ad-card {
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .ad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ad-title {
      font-weight: 600;
      font-size: 18px;
      color: #f8fafc;
    }
    .badge {
      background: #10b981;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.running {
      background: #f59e0b;
      animation: pulse 1.5s infinite;
    }
    .badge.stopped {
      background: #6b7280;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .format {
      background: #6366f1;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      text-transform: uppercase;
    }
    .wid {
      font-family: monospace;
      font-size: 10px;
      color: #94a3b8;
      background: #1e293b;
      padding: 4px 8px;
      border-radius: 8px;
      word-break: break-all;
      margin: 8px 0;
      display: block;
    }
    .ad-box {
      background: #0f172a;
      border-radius: 10px;
      min-height: 120px;
      margin: 12px 0;
      border: 1px dashed #334155;
      overflow: hidden;
      position: relative;
      transition: all 0.3s;
    }
    .ad-box.active {
      border-color: #10b981;
      border-style: solid;
    }
    .ad-box.running {
      border-color: #f59e0b;
      border-style: solid;
    }
    .status-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      font-size: 14px;
      gap: 8px;
      flex-direction: column;
    }
    .status-msg.loading { color: #fbbf24; }
    .status-msg.error { color: #f87171; }
    .status-msg.success { color: #86efac; }
    .status-msg.stopped { color: #6b7280; }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #334155;
      border-top: 2px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .ad-content {
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .ad-content img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #334155;
      flex-shrink: 0;
    }
    .ad-info {
      flex: 1;
      min-width: 0;
    }
    .ad-info h3 {
      font-size: 14px;
      margin-bottom: 4px;
      color: #f1f5f9;
      line-height: 1.3;
    }
    .ad-info p {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .ad-btn {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ad-btn:hover { background: #2563eb; transform: translateY(-1px); }
    
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      align-items: center;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .btn-start { background: #10b981; }
    .btn-start:hover { background: #059669; }
    .btn-start.running { background: #f59e0b; }
    .btn-start.running:hover { background: #d97706; }
    .btn-send { background: #6366f1; }
    .btn-send:hover { background: #4f46e5; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .timer-indicator {
      font-size: 11px;
      color: #fbbf24;
      margin-left: 8px;
      font-family: monospace;
    }
    .debug-info {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      font-family: monospace;
    }
    .note {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 16px;
    }
    .bot-status {
      background: #1e293b;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      text-align: center;
    }
    .overlay-ad {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Adexium Ads</h1>
    <div class="subtitle">Auto-reload ads every 20 seconds</div>
    <div class="bot-status" id="botStatus">⏳ Initializing...</div>
    <div id="adsContainer"></div>
    <div class="note">Click Start to begin auto-reload • Ads overlap previous ones</div>
  </div>

  <script>
    const BOT_TOKEN = '8730973868:AAGJjqGwN5wpNjlcqb6L335VRZZhvo4u8Uc';
    
    const placements = [
      { name: "Ticgames", wid: "30015b9a-df1e-4895-be7b-c5bc1b148fcf", format: "push-like", note: "Integration working" },
      { name: "Coin Empire", wid: "d29f2549-2e28-4016-8b89-f36b11f66244", format: "push-like", note: "Integration working" },
      { name: "Coin Empire", wid: "f2c903be-ac1d-4f6b-b0c7-8a281363517e", format: "interstitial", note: "Waiting for first request" }
    ];

    const widgets = {};
    const adCache = {};
    const intervals = {};
    const isRunning = {};

    if (window.Telegram?.WebApp) {
      try {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        console.log('✅ Telegram WebApp ready');
      } catch(e) {
        console.log('Telegram WebApp error:', e);
      }
    }

    async function checkBot() {
      const status = document.getElementById('botStatus');
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
        const data = await res.json();
        if (data.ok) {
          status.innerHTML = '✅ Bot @' + data.result.username + ' connected';
          status.style.color = '#86efac';
        } else {
          status.innerHTML = '⚠ Bot connection issue';
          status.style.color = '#fbbf24';
        }
      } catch(e) {
        status.innerHTML = '⚠ Cannot verify bot';
        status.style.color = '#fbbf24';
      }
    }

    function createWidget(placement, index) {
      const box = document.getElementById('ad-box-' + index);
      if (!box) return;
      
      if (typeof AdexiumWidget === 'undefined') {
        box.innerHTML = '<div class="status-msg error">⚠ Adexium SDK not loaded</div>';
        console.error('AdexiumWidget not available');
        return;
      }

      try {
        // Destroy existing widget if any
        if (widgets[index]) {
          try { widgets[index].destroy?.(); } catch(e) {}
          delete widgets[index];
        }

        box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Creating widget...</div>';

        // Create widget with debug mode to ensure ads show
        const widget = new AdexiumWidget({
          wid: placement.wid,
          adFormat: placement.format,
          debug: true, // Enable debug mode to get test ads
          firstAdImpressionIntervalInSeconds: 3,
          adImpressionIntervalInSeconds: 20
        });

        widgets[index] = widget;
        console.log(`✅ Widget created for ${placement.name} (debug: true)`);

        // Listen for ad received
        widget.on('adReceived', (ad) => {
          console.log(`📢 Ad received for ${placement.name}:`, ad);
          adCache[index] = ad;
          
          if (isRunning[index]) {
            displayAdOverlay(box, ad, placement, index);
          } else {
            renderAdInBox(box, ad, placement, index);
          }
        });

        // Listen for no ad found
        widget.on('noAdFound', () => {
          console.log(`📭 No ad found for ${placement.name}`);
          if (!isRunning[index]) {
            box.innerHTML = '<div class="status-msg success">✅ Widget ready - waiting for ad...</div>';
            box.classList.add('active');
          }
        });

        widget.on('adDisplayed', () => {
          console.log(`👁 Ad displayed for ${placement.name}`);
          box.classList.add('active');
        });

        widget.on('adClosed', () => {
          console.log(`❌ Ad closed for ${placement.name}`);
        });

        widget.on('adRedirected', () => {
          console.log(`🔗 Ad clicked for ${placement.name}`);
        });

        // Start autoMode immediately so ads show
        widget.autoMode();
        console.log(`🚀 AutoMode started for ${placement.name}`);

        // After 3 seconds, check if ad loaded
        setTimeout(() => {
          const hasAd = box.querySelector('img') || box.querySelector('iframe') || box.querySelector('.ad-content');
          if (!hasAd && !isRunning[index]) {
            box.innerHTML = '<div class="status-msg success">✅ Widget active - click Start</div>';
            box.classList.add('active');
          }
        }, 3000);

      } catch(e) {
        console.error(`❌ Widget error for ${placement.name}:`, e);
        box.innerHTML = `<div class="status-msg error">⚠ Error: ${e.message}</div>`;
      }
    }

    function displayAdOverlay(box, ad, placement, index) {
      // Remove previous overlay
      const existingOverlay = box.querySelector('.overlay-ad');
      if (existingOverlay) {
        existingOverlay.remove();
      }

      const overlay = document.createElement('div');
      overlay.className = 'overlay-ad';
      overlay.innerHTML = `
        <div class="ad-content" style="background:#0f172a;border-radius:10px;width:100%;max-width:90%;">
          <img src="${ad.creativeUrl || ''}" alt="Ad" 
               onerror="this.style.display='none'"
               loading="lazy" />
          <div class="ad-info">
            <h3>${ad.title || 'Sponsored'}</h3>
            ${ad.description ? `<p>${ad.description}</p>` : ''}
            <a href="${ad.clickUrl || '#'}" target="_blank" class="ad-btn" 
               onclick="window.Telegram?.WebApp?.openLink?.('${ad.clickUrl}')">
              ${ad.buttonText || 'Open'}
            </a>
            <button class="btn btn-start running" style="margin-top:8px;padding:4px 12px;font-size:11px;background:#ef4444;" 
                    onclick="this.closest('.overlay-ad').remove()">✕ Close</button>
          </div>
        </div>
      `;
      
      box.appendChild(overlay);
      box.classList.add('active', 'running');
      
      // Auto-remove overlay after 18 seconds
      setTimeout(() => {
        if (overlay.parentElement) {
          overlay.remove();
        }
      }, 18000);
    }

    function renderAdInBox(box, ad, placement, index) {
      if (!ad || !ad.creativeUrl) {
        box.innerHTML = '<div class="status-msg success">✅ Widget active</div>';
        return;
      }

      box.innerHTML = `
        <div class="ad-content">
          <img src="${ad.creativeUrl}" alt="Ad" 
               onerror="this.style.display='none'"
               loading="lazy" />
          <div class="ad-info">
            <h3>${ad.title || 'Sponsored'}</h3>
            ${ad.description ? `<p>${ad.description}</p>` : ''}
            <a href="${ad.clickUrl || '#'}" target="_blank" class="ad-btn" 
               onclick="window.Telegram?.WebApp?.openLink?.('${ad.clickUrl}')">
              ${ad.buttonText || 'Open'}
            </a>
          </div>
        </div>
        <div class="debug-info">Ad ID: ${ad.id || 'N/A'} | Format: ${ad.adFormat || placement.format}</div>
      `;
      box.classList.add('active');
    }

    function startAutoReload(index) {
      if (isRunning[index]) return;

      isRunning[index] = true;
      const placement = placements[index];
      const box = document.getElementById('ad-box-' + index);
      const widget = widgets[index];

      console.log(`▶ Starting auto-reload for ${placement.name}`);

      updateButtonState(index, true);
      updateBadgeState(index, true);
      
      if (box) {
        box.classList.add('running');
        const hasOverlay = box.querySelector('.overlay-ad');
        if (!hasOverlay) {
          box.innerHTML = '<div class="status-msg loading"><div class="spinner"></div>Starting auto-reload every 20s...</div>';
        }
      }

      // Request first ad immediately
      if (widget) {
        try {
          widget.requestAd(placement.format);
          console.log(`📡 First ad requested for ${placement.name}`);
        } catch(e) {
          console.error(`Error requesting ad:`, e);
        }
      }

      // Clear existing interval if any
      if (intervals[index]) {
        clearInterval(intervals[index]);
      }

      // Set interval to reload every 20 seconds
      intervals[index] = setInterval(() => {
        console.log(`⏰ Auto-reload triggered for ${placement.name}`);
        if (widget && isRunning[index]) {
          try {
            widget.requestAd(placement.format);
          } catch(e) {
            console.error(`Error in auto-reload:`, e);
          }
        }
      }, 20000);

      updateTimer(index);
    }

    function stopAutoReload(index) {
      if (!isRunning[index]) return;

      isRunning[index] = false;
      const placement = placements[index];
      const box = document.getElementById('ad-box-' + index);

      console.log(`⏹ Stopping auto-reload for ${placement.name}`);

      if (intervals[index]) {
        clearInterval(intervals[index]);
        delete intervals[index];
      }

      // Clear countdown
      if (intervals['countdown_' + index]) {
        clearInterval(intervals['countdown_' + index]);
        delete intervals['countdown_' + index];
      }

      updateButtonState(index, false);
      updateBadgeState(index, false);
      
      if (box) {
        box.classList.remove('running');
        const overlays = box.querySelectorAll('.overlay-ad');
        overlays.forEach(o => o.remove());
        
        const timer = box.querySelector('.timer-indicator');
        if (timer) timer.remove();
      }
    }

    function updateButtonState(index, running) {
      const startBtn = document.getElementById('start-btn-' + index);
      if (startBtn) {
        if (running) {
          startBtn.textContent = '⏹ Stop';
          startBtn.className = 'btn btn-start running';
        } else {
          startBtn.textContent = '▶ Start';
          startBtn.className = 'btn btn-start';
        }
      }
    }

    function updateBadgeState(index, running) {
      const badge = document.getElementById('badge-' + index);
      if (badge) {
        if (running) {
          badge.textContent = 'running';
          badge.className = 'badge running';
        } else {
          badge.textContent = 'active';
          badge.className = 'badge';
        }
      }
    }

    function updateTimer(index) {
      if (!isRunning[index]) return;

      if (intervals['countdown_' + index]) {
        clearInterval(intervals['countdown_' + index]);
      }

      let seconds = 20;
      const timerEl = document.getElementById('timer-' + index);
      if (timerEl) {
        timerEl.textContent = `Next ad in ${seconds}s`;
      }

      intervals['countdown_' + index] = setInterval(() => {
        if (!isRunning[index]) {
          clearInterval(intervals['countdown_' + index]);
          return;
        }
        
        seconds--;
        if (seconds <= 0) {
          seconds = 20;
        }
        
        if (timerEl) {
          timerEl.textContent = `Next ad in ${seconds}s`;
        }
      }, 1000);
    }

    async function sendToBot(index) {
      const ad = adCache[index];
      if (!ad?.creativeUrl) {
        alert('No ad available. Start auto-reload first.');
        return;
      }

      const user = { telegramId: 'test123' };
      try {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
          user.telegramId = String(window.Telegram.WebApp.initDataUnsafe.user.id);
        }
      } catch(e) {}

      const btn = document.getElementById('send-btn-' + index);
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Sending...'; }

      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: user.telegramId,
            photo: ad.creativeUrl,
            caption: `${ad.title || ''}\n\n${ad.description || ''}`,
            reply_markup: {
              inline_keyboard: [[{ text: ad.buttonText || 'Open', url: ad.clickUrl }]]
            }
          })
        });

        const result = await res.json();
        if (result.ok) {
          if (btn) { btn.textContent = '✅ Sent!'; }
          setTimeout(() => { 
            if (btn) { btn.textContent = '📨 Send to Bot'; btn.disabled = false; } 
          }, 3000);
        } else {
          throw new Error(result.description || 'Failed');
        }
      } catch(e) {
        alert('Send failed: ' + e.message);
        if (btn) { btn.textContent = '📨 Send to Bot'; btn.disabled = false; }
      }
    }

    function toggleAutoReload(index) {
      if (isRunning[index]) {
        stopAutoReload(index);
      } else {
        startAutoReload(index);
      }
    }

    function renderAll() {
      const container = document.getElementById('adsContainer');
      
      container.innerHTML = placements.map((p, i) => `
        <div class="ad-card">
          <div class="ad-header">
            <span class="ad-title">${p.name}</span>
            <span class="badge" id="badge-${i}">active</span>
            <span class="format">${p.format}</span>
          </div>
          <code class="wid">${p.wid}</code>
          <div class="ad-box" id="ad-box-${i}">
            <div class="status-msg loading"><div class="spinner"></div>Initializing widget...</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-start" id="start-btn-${i}" onclick="toggleAutoReload(${i})">▶ Start</button>
            <button class="btn btn-send" id="send-btn-${i}" onclick="sendToBot(${i})">📨 Send to Bot</button>
            <span class="timer-indicator" id="timer-${i}"></span>
          </div>
          <div class="debug-info">${p.note}</div>
        </div>
      `).join('');

      // Initialize widgets with autoMode
      placements.forEach((p, i) => {
        setTimeout(() => createWidget(p, i), i * 800);
      });
    }

    window.toggleAutoReload = toggleAutoReload;
    window.startAutoReload = startAutoReload;
    window.stopAutoReload = stopAutoReload;
    window.sendToBot = sendToBot;

    async function init() {
      console.log('🚀 Adexium Dashboard starting...');
      console.log('AdexiumWidget available:', typeof AdexiumWidget !== 'undefined');
      
      await checkBot();
      renderAll();
    }

    function waitForSDK(callback) {
      if (typeof AdexiumWidget !== 'undefined') {
        console.log('✅ AdexiumWidget already loaded');
        callback();
        return;
      }
      
      console.log('⏳ Waiting for AdexiumWidget SDK...');
      let attempts = 0;
      const interval = setInterval(() => {
        if (typeof AdexiumWidget !== 'undefined') {
          clearInterval(interval);
          console.log('✅ AdexiumWidget SDK loaded');
          callback();
        } else if (attempts >= 50) {
          clearInterval(interval);
          console.error('❌ AdexiumWidget SDK failed to load after 25 seconds');
          callback();
        }
        attempts++;
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      waitForSDK(init);
    });

    window.addEventListener('beforeunload', () => {
      Object.keys(intervals).forEach(key => {
        clearInterval(intervals[key]);
      });
    });
  </script>
</body>
</html>
